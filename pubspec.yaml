name: urdu_translator
description: Real-time Urdu to English translator for hearing device

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  speech_to_text: ^6.6.0
  translator: ^1.0.0+1
  flutter_tts: ^4.0.2
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.2
  avatar_glow: ^2.0.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
